name: Idealz Daily Price Intelligence

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM Sri Lanka Time (UTC+5:30) = 03:30 UTC
  workflow_dispatch:         # Manual trigger button in GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes Node.js deprecation warning

jobs:
  scrape-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set report date
        run: echo "REPORT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Install Python packages
        run: pip install playwright jinja2

      - name: Install Chromium browser
        run: playwright install chromium --with-deps

      - name: Scrape all 6 competitor sites
        run: python scraper.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Generate CEO dashboard
        run: python dashboard.py

      - name: Generate email report
        run: python email_report.py

      - name: Send price report email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "📊 Idealz Price Intelligence — ${{ env.REPORT_DATE }}"
          to: shakeebahamed456@gmail.com,irshadatidealz@gmail.com
          from: "Idealz Price Bot <${{ secrets.MAIL_USERNAME }}>"
          html_body: file://data/email_report.html
          attachments: data/prices_${{ env.REPORT_DATE }}.csv,data/report_${{ env.REPORT_DATE }}.html

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: price-report-${{ env.REPORT_DATE }}
          path: |
            data/prices_*.json
            data/prices_*.csv
            data/report_*.html
            data/email_report.html
            data/alerts_*.json
            logs/
          retention-days: 30

      # ── Copy latest dashboard to fixed filename for GitHub Pages ─────────────
      - name: Copy dashboard to GitHub Pages fixed URL
        run: cp data/report_${{ env.REPORT_DATE }}.html data/dashboard.html

      # ── Commit everything including dashboard.html ───────────────────────────
      - name: Commit scraped data to repo
        run: |
          git config user.name "Idealz Price Bot"
          git config user.email "actions@github.com"
          git add data/ logs/ || true
          git diff --staged --quiet || git commit -m "🤖 Price data: ${{ env.REPORT_DATE }}"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
